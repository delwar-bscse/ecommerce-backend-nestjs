services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: ecommerce-backend

    ports:
      - "3010:3000"

    volumes:
      - .:/app
      - /app/node_modules

    environment:
      NODE_ENV: docker

    restart: always

    env_file:
      - .env.docker

    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine

    container_name: ecommerce-postgres

    ports:
      - "5433:5432"

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: always

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 10s
      retries: 10

volumes:
  postgres_data: